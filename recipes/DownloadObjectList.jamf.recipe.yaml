Identifier: multitenant-jamf-tools.jamf.DownloadObjectList
Description: Downloads a list of objects to the specified directory. Requires the object type to be specified.
MinimumVersion: "2.3"

RequiredInputs:
  - OBJECT_TYPE

Input:
  OUTPUT_DIR: /Users/Shared/Jamf/JamfUploaderTests


Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfObjectReader
    Arguments:
      list_only: True
      object_type: "%OBJECT_TYPE%"
      output_dir: "%OUTPUT_DIR%"
